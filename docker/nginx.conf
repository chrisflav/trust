server {
  listen 80;
  root /usr/share/nginx/html;

  # decls.jsonl is tens of megabytes of text and compresses hard.  The edge
  # files are already binary, and gzipping them would only cost CPU.
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;

  # The index is bind-mounted rather than baked in: it is generated by
  # `trust export`, changes independently of the code, and is far too large to
  # live in an image.  A missing shard must 404 rather than fall through to the
  # SPA, or the frontend would try to parse index.html as an edge file.
  # `.jsonl` is not a type nginx knows, so it defaults to octet-stream and is
  # never compressed — which for a 76 MB declaration table is most of the load
  # time.  Named explicitly rather than adding octet-stream to `gzip_types`,
  # which would waste CPU re-compressing the already-binary edge files.
  location ~ ^/index/.*\.jsonl$ {
    default_type application/json;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=300";
  }

  location /index/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=300";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
